<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rêves — Produit</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="css/style.css?v=38">
</head>
<body data-page="product">
  <div class="diagonal"></div>
  <header id="site-header"></header>
  <img class="crane-corner" src="assets/papercrane.png" alt="">

  <main class="product">
    <div class="product__head">
      <h1 class="product__pagetitle" id="product-pagetitle"></h1>
      <p class="product__pageprice" id="product-pageprice"></p>
    </div>

    <div class="product__stage" id="stage"></div>

    <div class="product__controls">
      <section class="info" id="info">
        <div class="info__panel">
          <button class="info__head" onclick="toggleInfo()">
            <span id="info-title" data-i18n="informations">INFORMATIONS</span>
            <span class="info__toggle">+</span>
          </button>
          <div class="info__body" id="info-body"></div>
        </div>
      </section>

      <div class="thumbs" id="thumbs"></div>
      <div class="sizes-wrap" id="actions"></div>
    </div>

    <div class="product__spotify" id="spotify"></div>
  </main>

  <script src="js/data.js?v=38"></script>
  <script src="js/app.js?v=38"></script>
</body>
</html>
